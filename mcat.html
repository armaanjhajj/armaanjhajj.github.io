<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>mcat – armaan jhajj</title>
  <link rel="icon" type="image/png" href="https://i.imgur.com/9vZBHkB.png">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    body { margin:0; background:#fff; color:#111; font-family: 'Playfair Display', Georgia, serif; }
    main { max-width: 820px; margin: 4rem auto; padding: 0 1.25rem; }
    h1 { margin: 0 0 0.5rem; font-style: italic; font-size: clamp(1.8rem,4vw,2.6rem); }
    h2 { margin: 2.5rem 0 1rem; font-size: 1.3rem; font-weight: 600; color: #111; }

    .countdown {
      margin: 1.5rem 0 2.5rem;
      display: flex;
      gap: 1.5rem;
      flex-wrap: wrap;
    }
    .countdown-unit {
      text-align: center;
    }
    .countdown-unit .number {
      font-size: clamp(2rem, 5vw, 3rem);
      font-weight: 700;
      color: #111;
      line-height: 1;
    }
    .countdown-unit .label {
      font-size: 0.85rem;
      color: #888;
      margin-top: 0.25rem;
    }

    ul { padding-left: 1.2rem; }
    li { line-height: 1.8; color: #333; }
    li a { color: #4b2ca0; text-decoration: underline; }
    li a:hover { color: #333; }

    nav { margin-top: 2rem; }
    nav a { color: #4b2ca0; text-decoration: underline; }
  </style>
</head>
<body>
  <main>
    <h1>mcat</h1>
    <p style="color:#888; margin: 0 0 1rem; font-style: italic;">september 3, 2026</p>

    <div class="countdown">
      <div class="countdown-unit">
        <div class="number" id="days">--</div>
        <div class="label">days</div>
      </div>
      <div class="countdown-unit">
        <div class="number" id="hours">--</div>
        <div class="label">hours</div>
      </div>
      <div class="countdown-unit">
        <div class="number" id="minutes">--</div>
        <div class="label">minutes</div>
      </div>
      <div class="countdown-unit">
        <div class="number" id="seconds">--</div>
        <div class="label">seconds</div>
      </div>
    </div>

    <h2>resources used thus far</h2>
    <ul>
      <li><a href="https://www.khanacademy.org/test-prep/mcat/processing-the-environment" target="_blank" rel="noopener">Khan Academy Psych/Soc Playlist — Units 11-15 (AAMC Foundations 6-10)</a></li>
      <li><a href="https://jackwestin.com/daily/mcat-practice-passages/cars-practice-passages/" target="_blank" rel="noopener">Jack Westin Daily CARS Passage</a></li>
      <li><a href="https://www.dropbox.com/scl/fi/t1rri4wq85msyf5hxrvvx/KA-P-S-The-Lazy-OCD-Version.docx?rlkey=flx5ipnge4198x7hkow6a9ryk&e=1&dl=0" target="_blank" rel="noopener">The Lazy OCD 86-Page Doc for Psych/Soc</a></li>
    </ul>

    <nav><a href="/">home</a></nav>
  </main>

  <script>
    const target = new Date('2026-09-03T00:00:00-04:00');
    function updateCountdown() {
      const now = new Date();
      const diff = target - now;
      if (diff <= 0) {
        document.getElementById('days').textContent = '0';
        document.getElementById('hours').textContent = '0';
        document.getElementById('minutes').textContent = '0';
        document.getElementById('seconds').textContent = '0';
        return;
      }
      const d = Math.floor(diff / (1000 * 60 * 60 * 24));
      const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
      const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
      const s = Math.floor((diff % (1000 * 60)) / 1000);
      document.getElementById('days').textContent = d;
      document.getElementById('hours').textContent = h;
      document.getElementById('minutes').textContent = m;
      document.getElementById('seconds').textContent = s;
    }
    updateCountdown();
    setInterval(updateCountdown, 1000);
  </script>
</body>
</html>
